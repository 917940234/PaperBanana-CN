# Model and Gateway Configuration for PaperBanana-CN

# Shared defaults for Gemini provider
defaults:
  model_name: "" # e.g., "gemini-3.1-flash-lite-preview"
  image_model_name: "" # e.g., "gemini-3.1-flash-image-preview"

# Proxy-friendly channel settings. System environment variables take precedence:
# PAPERBANANA_GEMINI_BASE_URL, PAPERBANANA_GEMINI_VLM_MODEL,
# PAPERBANANA_GEMINI_IMAGE_MODEL, PAPERBANANA_GEMINI_VLM_API_KEY,
# PAPERBANANA_GEMINI_IMAGE_API_KEY, PAPERBANANA_OPENAI_BASE_URL,
# PAPERBANANA_OPENAI_VLM_MODEL, PAPERBANANA_OPENAI_IMAGE_MODEL,
# PAPERBANANA_OPENAI_VLM_API_KEY, PAPERBANANA_OPENAI_IMAGE_API_KEY.
gemini:
  base_url: ""
  vlm_model: ""
  image_model: ""
  vlm_api_key: ""
  image_api_key: ""

openai:
  base_url: ""
  vlm_model: ""
  image_model: ""
  vlm_api_key: ""
  image_api_key: ""
  
# API Keys. Recommended precedence:
# 1. Environment variables
# 2. configs/local/*.txt
# 3. This YAML file
api_keys:
  google_api_key: "" # optional if using configs/local/google_api_key.txt
  openai_api_key: ""
  anthropic_api_key: ""

# Evolink Provider configuration
evolink:
  api_key: "" # optional if using configs/local/evolink_api_key.txt
  base_url: "https://api.evolink.ai"
  model_name: "gemini-2.5-flash"
  image_model_name: "nano-banana-2-lite"

# OpenRouter Provider configuration
openrouter:
  api_key: "" # optional if using configs/local/openrouter_api_key.txt
  base_url: "https://openrouter.ai/api/v1"
  model_name: "google/gemini-3.1-flash-lite-preview"  # format: provider/model-name
  image_model_name: "google/gemini-3.1-flash-image-preview"
